<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bay Area School Research</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3340;
    --text: #e4e6eb;
    --text2: #9ca3af;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --orange: #fb923c;
    --blue: #60a5fa;
    --pink: #f472b6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

  .app { max-width: 1400px; margin: 0 auto; padding: 20px; }

  header { text-align: center; padding: 30px 0 20px; }
  header h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
  header p { color: var(--text2); font-size: 0.95rem; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; justify-content: center; margin: 20px 0; background: var(--surface); border-radius: 12px; padding: 4px; width: fit-content; margin-left: auto; margin-right: auto; }
  .tab { padding: 8px 20px; border-radius: 10px; border: none; background: none; color: var(--text2); cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { color: var(--text); background: var(--surface2); }

  /* Filters */
  .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; padding: 16px; background: var(--surface); border-radius: 12px; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 0.75rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .filter-group select, .filter-group input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 8px; font-size: 0.85rem; outline: none; }
  .filter-group select:focus, .filter-group input:focus { border-color: var(--accent); }
  .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .pill { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 0.8rem; transition: all 0.2s; }
  .pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  .pill:hover:not(.active) { border-color: var(--text2); color: var(--text); }
  .reset-btn { background: none; border: none; color: var(--accent2); cursor: pointer; font-size: 0.8rem; margin-left: auto; }
  .reset-btn:hover { text-decoration: underline; }

  /* Cards View */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
  .school-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; }
  .school-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .school-card.top-pick { border-color: var(--yellow); }
  .school-card.top-pick::before { content: 'Top Pick'; position: absolute; top: -10px; right: 16px; background: var(--yellow); color: #000; font-size: 0.7rem; font-weight: 700; padding: 2px 10px; border-radius: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-header h3 { font-size: 1.1rem; font-weight: 600; }
  .card-rank { font-size: 0.75rem; color: var(--text2); background: var(--surface2); padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .card-meta { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .meta-item { font-size: 0.8rem; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .meta-item strong { color: var(--text); }
  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .badge { font-size: 0.72rem; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .badge-spanish { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-spanish.weak { background: rgba(251,191,36,0.08); color: #b89a30; }
  .badge-stem { background: rgba(99,102,241,0.15); color: var(--accent2); }
  .badge-accel { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-free { background: rgba(52,211,153,0.2); color: var(--green); font-weight: 700; }
  .badge-girls { background: rgba(244,114,182,0.15); color: var(--pink); }
  .card-summary { font-size: 0.85rem; color: var(--text2); line-height: 1.6; }
  .card-actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn-sm { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-sm.compare-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Table View */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); cursor: pointer; white-space: nowrap; user-select: none; position: sticky; top: 0; }
  th:hover { color: var(--text); }
  th .sort-arrow { margin-left: 4px; font-size: 0.7rem; }
  td { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--surface); white-space: nowrap; }
  tr:hover td { background: var(--surface2); }
  td.school-name { font-weight: 600; white-space: normal; min-width: 160px; cursor: pointer; }
  td.school-name:hover { color: var(--accent2); }
  .strength-dots { display: flex; gap: 2px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .dot.filled { background: var(--accent); }
  .dot.filled.green { background: var(--green); }
  .dot.filled.yellow { background: var(--yellow); }

  /* Compare View */
  .compare-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 100; transform: translateY(100%); transition: transform 0.3s; }
  .compare-bar.visible { transform: translateY(0); }
  body.compare-active { padding-bottom: 70px; }
  .compare-chips { display: flex; gap: 8px; flex: 1; flex-wrap: wrap; }
  .compare-chip { background: var(--surface2); padding: 4px 12px; border-radius: 20px; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; }
  .compare-chip button { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1rem; line-height: 1; }
  .compare-go { background: var(--accent); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
  .compare-go:hover { background: var(--accent2); }

  /* Detail Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; justify-content: center; align-items: flex-start; padding: 40px 20px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; max-width: 720px; width: 100%; padding: 30px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text2); font-size: 1.5rem; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .modal h2 { font-size: 1.5rem; margin-bottom: 4px; }
  .modal-subtitle { color: var(--text2); font-size: 0.9rem; margin-bottom: 20px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  .modal-stat { background: var(--surface2); padding: 14px; border-radius: 10px; }
  .modal-stat label { font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  .modal-stat span { font-size: 1.05rem; font-weight: 600; }
  .modal-section { margin-bottom: 18px; }
  .modal-section h4 { font-size: 0.85rem; color: var(--accent2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-section p, .modal-section li { font-size: 0.9rem; color: var(--text2); line-height: 1.7; }
  .modal-section ul { padding-left: 18px; }
  .modal-section li { margin-bottom: 4px; }
  .pro { color: var(--green); }
  .con { color: var(--red); }
  .modal-link { display: inline-block; margin-top: 12px; color: var(--accent2); text-decoration: none; font-size: 0.9rem; }
  .modal-link:hover { text-decoration: underline; }
  .modal-neighborhood { background: var(--surface2); padding: 16px; border-radius: 10px; margin-top: 16px; }
  .modal-neighborhood h4 { margin-bottom: 6px; color: var(--orange); }
  .modal-neighborhood p { font-size: 0.88rem; color: var(--text2); }

  /* Compare Page */
  .compare-view { display: none; overflow-x: auto; }
  .compare-view.active { display: block; }
  .compare-table { width: 100%; border-collapse: collapse; }
  .compare-table th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 0.78rem; text-transform: uppercase; color: var(--text2); letter-spacing: 0.5px; min-width: 100px; position: sticky; left: 0; z-index: 2; }
  .compare-table td { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); min-width: 220px; vertical-align: top; font-size: 0.88rem; }
  .compare-table tr:first-child td { font-weight: 700; font-size: 1rem; }
  .best-value { background: rgba(52,211,153,0.1) !important; }

  /* Scores */
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .score-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; max-width: 80px; }
  .score-fill { height: 100%; border-radius: 3px; }
  .score-label { font-size: 0.8rem; color: var(--text2); min-width: 28px; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty-state h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--text); }

  .view-container { display: none; }
  .view-container.active { display: block; }

  @media (max-width: 768px) {
    .cards-grid { grid-template-columns: 1fr; }
    .filters { flex-direction: column; }
    .modal-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Bay Area School Explorer</h1>
    <p>34 schools researched from 2000 N Shoreline Blvd, Mountain View &mdash; 19 private, 13 public, 2 charter</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-view="cards">Cards</button>
    <button class="tab" data-view="table">Table</button>
    <button class="tab" data-view="compare">Compare</button>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Max Distance</label>
      <select id="f-distance">
        <option value="99">Any</option>
        <option value="5">Under 5 mi</option>
        <option value="10">Under 10 mi</option>
        <option value="15">Under 15 mi</option>
        <option value="20">Under 20 mi</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Max Tuition</label>
      <select id="f-tuition">
        <option value="999999">Any</option>
        <option value="0">Free only</option>
        <option value="35000">Under $35k</option>
        <option value="45000">Under $45k</option>
        <option value="55000">Under $55k</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Spanish</label>
      <select id="f-spanish">
        <option value="any">Any</option>
        <option value="strong">Strong program</option>
        <option value="yes">Has Spanish</option>
        <option value="no">No Spanish (show all)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>STEM/Robotics</label>
      <select id="f-stem">
        <option value="0">Any</option>
        <option value="4">Strong (4+)</option>
        <option value="3">Moderate+ (3+)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Grades</label>
      <select id="f-grades">
        <option value="any">Any</option>
        <option value="k12">K/TK-12</option>
        <option value="ms">Has Middle School</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Type</label>
      <select id="f-type">
        <option value="any">Any</option>
        <option value="public">Public only</option>
        <option value="private">Private only</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Sort By</label>
      <select id="f-sort">
        <option value="rank">Recommendation</option>
        <option value="distance">Distance</option>
        <option value="tuition">Tuition (low-high)</option>
        <option value="spanish">Spanish strength</option>
        <option value="stem">STEM strength</option>
        <option value="name">Name A-Z</option>
      </select>
    </div>
    <button class="reset-btn" onclick="resetFilters()">Reset filters</button>
  </div>

  <div id="view-cards" class="view-container active">
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <div id="view-table" class="view-container">
    <div class="table-wrap">
      <table id="school-table">
        <thead>
          <tr>
            <th data-sort="name">School <span class="sort-arrow"></span></th>
            <th>Type</th>
            <th data-sort="distance">Dist <span class="sort-arrow"></span></th>
            <th data-sort="drive">Drive <span class="sort-arrow"></span></th>
            <th data-sort="tuition">Tuition <span class="sort-arrow"></span></th>
            <th data-sort="spanish">Spanish <span class="sort-arrow"></span></th>
            <th data-sort="stem">STEM <span class="sort-arrow"></span></th>
            <th data-sort="accel">Accel <span class="sort-arrow"></span></th>
            <th>Grades</th>
            <th>Co-ed</th>
            <th>Reviews</th>
            <th>Website</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <div id="view-compare" class="view-container">
    <div class="compare-view active" id="compare-content"></div>
  </div>
</div>

<div class="compare-bar" id="compare-bar">
  <span style="font-size:0.85rem;color:var(--text2)">Compare:</span>
  <div class="compare-chips" id="compare-chips"></div>
  <button class="compare-go" onclick="showCompare()">Compare Now</button>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

let compareSet = new Set();
let currentView = 'cards';

// Render functions
function getFiltered() {
  const maxDist = +document.getElementById('f-distance').value;
  const maxTuition = +document.getElementById('f-tuition').value;
  const spanishFilter = document.getElementById('f-spanish').value;
  const minStem = +document.getElementById('f-stem').value;
  const gradesFilter = document.getElementById('f-grades').value;
  const sortBy = document.getElementById('f-sort').value;

  let filtered = schools.filter(s => {
    if (s.distance > maxDist) return false;
    if (maxTuition === 0 && s.tuition !== 0) return false;
    if (maxTuition > 0 && s.tuition > maxTuition) return false;
    if (spanishFilter === 'strong' && s.spanish < 4) return false;
    if (spanishFilter === 'yes' && s.spanish < 1) return false;
    if (s.stem < minStem) return false;
    if (gradesFilter === 'k12' && !s.k12) return false;
    const typeFilter = document.getElementById('f-type').value;
    if (typeFilter === 'public' && s.type === 'Private') return false;
    if (typeFilter === 'private' && s.type !== 'Private') return false;
    return true;
  });

  const sorters = {
    rank: (a, b) => a.rank - b.rank,
    distance: (a, b) => a.distance - b.distance,
    tuition: (a, b) => a.tuition - b.tuition,
    spanish: (a, b) => b.spanish - a.spanish,
    stem: (a, b) => b.stem - a.stem,
    name: (a, b) => a.name.localeCompare(b.name)
  };
  filtered.sort(sorters[sortBy] || sorters.rank);
  return filtered;
}

function reviewSentimentColor(sentiment) {
  if (sentiment.includes('Strongly Positive')) return 'var(--green)';
  if (sentiment.includes('Positive')) return 'var(--green)';
  if (sentiment.includes('Negative')) return 'var(--red)';
  return 'var(--yellow)';
}

function dots(n, max, color) {
  return Array.from({length: max}, (_, i) =>
    `<div class="dot ${i < n ? 'filled ' + color : ''}"></div>`
  ).join('');
}

function scoreBar(val, max, color) {
  const pct = (val / max) * 100;
  const colors = { green: 'var(--green)', yellow: 'var(--yellow)', blue: 'var(--accent2)' };
  return `<div class="score-bar"><div class="score-track"><div class="score-fill" style="width:${pct}%;background:${colors[color]||colors.blue}"></div></div><span class="score-label">${val}/${max}</span></div>`;
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const filtered = getFiltered();
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><h3>No schools match your filters</h3><p>Try adjusting your criteria above</p></div>';
    return;
  }
  grid.innerHTML = filtered.map(s => `
    <div class="school-card ${s.topPick ? 'top-pick' : ''}" onclick="openModal('${s.name}')">
      <div class="card-header">
        <h3>${s.name}</h3>
        <span class="card-rank">#${s.rank} pick</span>
      </div>
      <div class="card-meta">
        <span class="meta-item">~${s.distance} mi / <strong>${s.drive}</strong></span>
        <span class="meta-item"><strong>${s.tuitionDisplay}</strong>/yr</span>
        <span class="meta-item">${s.grades}</span>
      </div>
      <div class="card-badges">
        ${s.spanish >= 4 ? `<span class="badge badge-spanish">Spanish: ${s.spanishLabel}</span>` : s.spanish > 0 ? `<span class="badge badge-spanish weak">Spanish: ${s.spanishLabel}</span>` : `<span class="badge" style="background:rgba(248,113,113,0.12);color:var(--red)">No Spanish</span>`}
        ${s.stem >= 4 ? `<span class="badge badge-stem">STEM: ${s.stemLabel}</span>` : ''}
        ${s.accel >= 4 ? `<span class="badge badge-accel">${s.accelLabel}</span>` : ''}
        ${s.tuition === 0 ? `<span class="badge badge-free">FREE</span>` : ''}
        ${!s.coed ? `<span class="badge badge-girls">Girls Only</span>` : ''}
        ${s.type === 'Public Charter' ? `<span class="badge" style="background:rgba(96,165,250,0.15);color:var(--blue)">Public Charter</span>` : s.type === 'Public' ? `<span class="badge" style="background:rgba(96,165,250,0.15);color:var(--blue)">Public</span>` : ''}
      </div>
      ${reviews[s.name] ? `<div style="font-size:0.8rem;margin-bottom:8px"><span style="color:${reviewSentimentColor(reviews[s.name].sentiment)};font-weight:600">Reviews: ${reviews[s.name].sentiment}</span> <span style="color:var(--text2)">(${reviews[s.name].rating})</span></div>` : ''}
      <div class="card-summary">${s.bestFor}</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-sm" onclick="openModal('${s.name}')">Details</button>
        <a class="btn-sm" href="${s.url}" target="_blank" rel="noopener" style="text-decoration:none">Website</a>
        <button class="btn-sm compare-btn ${compareSet.has(s.name)?'active':''}" onclick="toggleCompare('${s.name}')">
          ${compareSet.has(s.name) ? 'In Compare' : '+ Compare'}
        </button>
      </div>
    </div>
  `).join('');
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  const filtered = getFiltered();
  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td class="school-name" onclick="openModal('${s.name}')">${s.name}${s.topPick?' *':''}</td>
      <td>${s.type}</td>
      <td>~${s.distance} mi</td>
      <td>${s.drive}</td>
      <td>${s.tuitionDisplay}</td>
      <td><div class="strength-dots">${dots(s.spanish, 5, 'yellow')}</div></td>
      <td><div class="strength-dots">${dots(s.stem, 5, '')}</div></td>
      <td><div class="strength-dots">${dots(s.accel, 5, 'green')}</div></td>
      <td>${s.grades}</td>
      <td>${s.coed ? 'Yes' : 'Girls'}</td>
      <td>${reviews[s.name] ? `<span style="color:${reviewSentimentColor(reviews[s.name].sentiment)};font-size:0.8rem;font-weight:500">${reviews[s.name].sentiment}</span>` : '<span style="color:var(--text2);font-size:0.8rem">—</span>'}</td>
      <td><a href="${s.url}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none">Visit</a></td>
    </tr>
  `).join('');
}

function renderCompare() {
  const el = document.getElementById('compare-content');
  const selected = schools.filter(s => compareSet.has(s.name));
  if (selected.length < 2) {
    el.innerHTML = '<div class="empty-state"><h3>Select 2+ schools to compare</h3><p>Use the "+ Compare" button on school cards, then switch to this tab</p></div>';
    return;
  }
  const rows = [
    { label: 'School', fn: s => `<strong>${s.name}</strong>` },
    { label: 'Type', fn: s => s.type },
    { label: 'Distance', fn: s => `~${s.distance} mi / ${s.drive}` },
    { label: 'Tuition', fn: s => s.tuitionDisplay + '/yr', best: s => s.tuition },
    { label: 'Grades', fn: s => s.grades },
    { label: 'Co-ed', fn: s => s.coed ? 'Yes' : 'Girls only' },
    { label: 'Spanish', fn: s => `${scoreBar(s.spanish,5,'yellow')}<div style="margin-top:4px;font-size:0.82rem;color:var(--text2)">${s.spanishNote}</div>` },
    { label: 'STEM/Robotics', fn: s => `${scoreBar(s.stem,5,'blue')}<div style="margin-top:4px;font-size:0.82rem;color:var(--text2)">${s.stemNote}</div>` },
    { label: 'Accelerated', fn: s => `${scoreBar(s.accel,5,'green')}<div style="margin-top:4px;font-size:0.82rem;color:var(--text2)">${s.accelNote}</div>` },
    { label: 'Pros', fn: s => `<ul style="padding-left:14px;margin:0">${s.pros.map(p=>`<li class="pro" style="font-size:0.82rem;margin-bottom:3px">${p}</li>`).join('')}</ul>` },
    { label: 'Cons', fn: s => `<ul style="padding-left:14px;margin:0">${s.cons.map(c=>`<li class="con" style="font-size:0.82rem;margin-bottom:3px">${c}</li>`).join('')}</ul>` },
    { label: 'Neighborhood', fn: s => `<strong>${s.neighborhood}</strong><br><span style="font-size:0.82rem;color:var(--text2)">${s.neighborhoodNote}</span>` },
    { label: 'Parent Reviews', fn: s => { const r = reviews[s.name]; if (!r) return '<span style="color:var(--text2)">No reviews yet</span>'; return `<span style="color:${reviewSentimentColor(r.sentiment)};font-weight:600">${r.sentiment}</span><br><span style="font-size:0.82rem;color:var(--text2)">${r.rating}</span><div style="margin-top:6px;font-size:0.82rem;color:var(--text2)">${r.takeaway}</div>`; }},
    { label: 'Website', fn: s => `<a href="${s.url}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none">${s.url.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'')}</a>` }
  ];

  // Find best tuition
  const minTuition = Math.min(...selected.map(s => s.tuition));

  el.innerHTML = `<div class="table-wrap"><table class="compare-table">
    ${rows.map(r => `<tr>
      <th>${r.label}</th>
      ${selected.map(s => `<td ${r.best && r.best(s) === minTuition && selected.length > 1 ? 'class="best-value"' : ''}>${r.fn(s)}</td>`).join('')}
    </tr>`).join('')}
  </table></div>`;
}

function openModal(name) {
  const s = schools.find(x => x.name === name);
  if (!s) return;
  const modal = document.getElementById('modal');
  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2>${s.name}</h2>
    <div class="modal-subtitle">${s.address}</div>
    <div class="modal-grid">
      <div class="modal-stat"><label>Distance</label><span>~${s.distance} mi / ${s.drive}</span></div>
      <div class="modal-stat"><label>Tuition</label><span>${s.tuitionDisplay}/yr</span></div>
      <div class="modal-stat"><label>Grades</label><span>${s.grades}</span></div>
      <div class="modal-stat"><label>Co-ed</label><span>${s.coed ? 'Yes' : 'Girls only'}</span></div>
      <div class="modal-stat"><label>Type</label><span>${s.type}</span></div>
    </div>
    <div class="modal-section">
      <h4>Spanish Language ${scoreBar(s.spanish,5,'yellow')}</h4>
      <p>${s.spanishNote}</p>
    </div>
    <div class="modal-section">
      <h4>STEM / Robotics ${scoreBar(s.stem,5,'blue')}</h4>
      <p>${s.stemNote}</p>
    </div>
    <div class="modal-section">
      <h4>Acceleration ${scoreBar(s.accel,5,'green')}</h4>
      <p>${s.accelNote}</p>
    </div>
    <div class="modal-section">
      <h4>Pros</h4>
      <ul>${s.pros.map(p => `<li class="pro">${p}</li>`).join('')}</ul>
    </div>
    <div class="modal-section">
      <h4>Cons</h4>
      <ul>${s.cons.map(c => `<li class="con">${c}</li>`).join('')}</ul>
    </div>
    <div class="modal-neighborhood">
      <h4>Recommended Neighborhood: ${s.neighborhood}</h4>
      <p>${s.neighborhoodNote}</p>
    </div>
    <a class="modal-link" href="${s.url}" target="_blank" rel="noopener">Visit school website &rarr;</a>
    ${renderModalReview(s.name)}
  `;
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderModalReview(name) {
  const r = reviews[name];
  if (!r) return '';
  const sentimentColor = reviewSentimentColor(r.sentiment);
  return `
    <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border)">
      <h4 style="font-size:1.1rem;margin-bottom:4px">Parent Reviews</h4>
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
        <span style="color:${sentimentColor};font-weight:600;font-size:0.95rem">${r.sentiment}</span>
        <span style="color:var(--text2);font-size:0.85rem">${r.rating}</span>
        <span style="color:var(--text2);font-size:0.82rem">(${r.reviewCount})</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:16px">
        ${r.quotes.map(q => `
          <blockquote style="margin:0;padding:10px 14px;border-left:3px solid ${q.type==='pro'?'var(--green)':'var(--red)'};background:var(--surface2);border-radius:0 8px 8px 0;font-size:0.88rem;color:var(--text)">
            "${q.text}"
            <span style="display:block;margin-top:4px;font-size:0.75rem;color:var(--text2)">— ${q.source}</span>
          </blockquote>
        `).join('')}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
        <div>
          <h4 style="font-size:0.82rem;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">What Parents Love</h4>
          <ul style="padding-left:16px;margin:0">${r.loves.map(l => `<li style="font-size:0.85rem;color:var(--text2);margin-bottom:4px">${l}</li>`).join('')}</ul>
        </div>
        <div>
          <h4 style="font-size:0.82rem;color:var(--red);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Concerns</h4>
          <ul style="padding-left:16px;margin:0">${r.concerns.map(c => `<li style="font-size:0.85rem;color:var(--text2);margin-bottom:4px">${c}</li>`).join('')}</ul>
        </div>
      </div>
      <div style="background:var(--surface2);padding:12px 16px;border-radius:10px;margin-bottom:12px">
        <strong style="font-size:0.85rem;color:var(--orange)">Bottom Line:</strong>
        <span style="font-size:0.88rem;color:var(--text2)"> ${r.takeaway}</span>
      </div>
      <div style="font-size:0.78rem;color:var(--text2)">
        Sources: ${r.sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener" style="color:var(--accent2);text-decoration:none">${s.name}</a>`).join(' · ')}
      </div>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function toggleCompare(name) {
  if (compareSet.has(name)) compareSet.delete(name);
  else if (compareSet.size < 5) compareSet.add(name);
  updateCompareBar();
  renderCards();
  if (currentView === 'compare') renderCompare();
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  const chips = document.getElementById('compare-chips');
  if (compareSet.size === 0) {
    bar.classList.remove('visible');
    document.body.classList.remove('compare-active');
    return;
  }
  bar.classList.add('visible');
  document.body.classList.add('compare-active');
  chips.innerHTML = [...compareSet].map(name => `
    <span class="compare-chip">${name} <button onclick="toggleCompare('${name}')">&times;</button></span>
  `).join('');
}

function showCompare() {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === 'compare'));
  document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
  document.getElementById('view-compare').classList.add('active');
  currentView = 'compare';
  renderCompare();
}

function resetFilters() {
  document.getElementById('f-distance').value = '99';
  document.getElementById('f-tuition').value = '999999';
  document.getElementById('f-spanish').value = 'any';
  document.getElementById('f-stem').value = '0';
  document.getElementById('f-grades').value = 'any';
  document.getElementById('f-type').value = 'any';
  document.getElementById('f-sort').value = 'rank';
  renderAll();
}

function renderAll() {
  renderCards();
  renderTable();
  if (currentView === 'compare') renderCompare();
}

// Event listeners
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const view = tab.dataset.view;
    currentView = view;
    document.querySelectorAll('.view-container').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    if (view === 'compare') renderCompare();
  });
});

document.querySelectorAll('.filters select').forEach(sel => {
  sel.addEventListener('change', renderAll);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Initial render
renderAll();
</script>
